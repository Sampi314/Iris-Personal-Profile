<svg width="400" height="400" viewBox="0 0 400 400" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <linearGradient id="bg-grad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#fdf8f5"/>
      <stop offset="100%" stop-color="#f9f0ec"/>
    </linearGradient>
    <linearGradient id="accent-grad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#c4587a"/>
      <stop offset="60%" stop-color="#d4739d"/>
      <stop offset="100%" stop-color="#c4587a"/>
    </linearGradient>
    <filter id="glow">
      <feGaussianBlur stdDeviation="6" result="blur"/>
      <feMerge>
        <feMergeNode in="blur"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
  </defs>

  <!-- Background -->
  <rect width="400" height="400" rx="48" fill="url(#bg-grad)"/>

  <!-- Subtle border -->
  <rect x="2" y="2" width="396" height="396" rx="46" fill="none" stroke="#d4739d" stroke-width="2" opacity="0.3"/>

  <!-- Corner accent dots -->
  <circle cx="40" cy="40" r="3" fill="#d4739d" opacity="0.4"/>
  <circle cx="360" cy="40" r="3" fill="#d4739d" opacity="0.4"/>
  <circle cx="40" cy="360" r="3" fill="#d4739d" opacity="0.4"/>
  <circle cx="360" cy="360" r="3" fill="#d4739d" opacity="0.4"/>

  <!-- Decorative grid lines -->
  <line x1="40" y1="56" x2="360" y2="56" stroke="#d4739d" stroke-width="0.5" opacity="0.12"/>
  <line x1="40" y1="344" x2="360" y2="344" stroke="#d4739d" stroke-width="0.5" opacity="0.12"/>

  <!-- IP monogram text -->
  <text x="200" y="248" text-anchor="middle" font-family="'Space Mono', 'SF Mono', 'Consolas', monospace" font-size="160" font-weight="700" fill="url(#accent-grad)" filter="url(#glow)" letter-spacing="-4">IP</text>

  <!-- Tagline -->
  <text x="200" y="320" text-anchor="middle" font-family="'Outfit', 'Segoe UI', sans-serif" font-size="18" fill="#1a1a1f" opacity="0.5" letter-spacing="6" text-transform="uppercase">IRIS PHAN</text>
</svg>
